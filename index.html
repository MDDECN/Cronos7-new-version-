<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRONOS 7 | Advanced Research Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00e5ff; 
            --primary-glow: rgba(0, 229, 255, 0.3);
            --bg: #030303; 
            --panel: rgba(15, 15, 15, 0.85); 
            --text: #f0f0f0; 
            --text-dim: #707070;
            --border: rgba(0, 229, 255, 0.15); 
            --error: #ff4444;
        }

        * { box-sizing: border-box; transition: background 0.2s, transform 0.2s; }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
            line-height: 1.6;
        }

        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.6;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 280px; background: var(--panel); 
            backdrop-filter: blur(20px); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 20px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 50px;
            text-align: center; color: #fff; text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        .nav-link { 
            padding: 14px 18px; margin: 6px 0; border-radius: 12px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 12px;
        }

        .nav-link:hover:not(.active) { background: rgba(0, 229, 255, 0.05); color: #fff; }
        .nav-link.active { 
            background: var(--primary-glow); color: var(--primary); 
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }

        .card { 
            background: var(--panel); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 20px; 
            padding: 25px; width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        #feed-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        .input-node { 
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; color: white; outline: none;
            margin-bottom: 15px; font-family: 'JetBrains Mono', monospace;
        }
        .input-node:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        .btn-primary { 
            background: var(--primary); color: #000; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--primary-glow); }

        .post-card { 
            animation: reveal 0.4s ease-out forwards;
            border-left: 3px solid var(--primary);
            position: relative;
        }
        
        @keyframes reveal { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .avatar { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--primary); object-fit: cover; }
        
        @media (max-width: 850px) {
            .sidebar { 
                width: 100%; height: 70px; bottom: 0; top: auto;
                flex-direction: row; padding: 0 10px; border-right: none; border-top: 1px solid var(--border);
                justify-content: space-around; border-radius: 0;
            }
            .sidebar .logo, .sidebar .logout-box { display: none; }
            .main-content { margin-left: 0; padding: 20px 15px 90px 15px; }
            .nav-link span { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="auth-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 20px;">
        <div class="card" style="max-width:400px;">
            <div class="logo">CRONOS<span>7</span></div>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="input-node" placeholder="Researcher Alias">
            </div>
            <input type="email" id="auth-email" class="input-node" placeholder="Access Email">
            <input type="password" id="auth-pass" class="input-node" placeholder="Access Key">
            <button class="btn-primary" id="btn-auth">Initialize Connection</button>
            <p id="toggle-auth-btn" style="color:var(--text-dim); font-size:0.85rem; text-align:center; margin-top:20px; cursor:pointer">
                Protocol: <span style="color:var(--primary)" id="auth-toggle-text">New Registration</span>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="sidebar">
            <div class="logo">CRONOS<span>7</span></div>
            <div class="nav-link active" id="l-feed"><span>Stream</span></div>
            <div class="nav-link" id="l-create"><span>Broadcast</span></div>
            <div class="nav-link" id="l-profile"><span>Station</span></div>
            <div class="logout-box" style="margin-top:auto; width: 100%;">
                <button id="logout-btn" class="btn-primary" style="background:transparent; color:var(--error); border: 1px solid var(--error); font-size: 0.7rem;">DISCONNECT</button>
            </div>
        </nav>

        <main class="main-content container">
            <div id="tab-feed">
                <input type="text" id="search-bar" class="input-node" placeholder="Filter encrypted stream...">
                <div id="feed-container"></div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin:0 0 20px 0; color: var(--primary);">New Transmission</h3>
                    <input type="text" id="post-t" class="input-node" placeholder="Subject">
                    <textarea id="post-c" class="input-node" rows="5" placeholder="Payload content..."></textarea>
                    <button class="btn-primary" id="btn-publish">Transmit Data</button>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div id="profile-render"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.firebasestorage.app",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;
        let isReg = false;

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.init();
            }
            draw() {
                ctx.fillStyle = '#00e5ff'; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                const link = document.getElementById('l-'+id);
                if(link) link.classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts();
            if(t === 'profile') renderProfile();
        }

        async function handleAuth() {
            const btn = document.getElementById('btn-auth');
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Missing credentials");
            
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            try {
                if(isReg) {
                    const user = document.getElementById('reg-user').value.trim() || "Researcher";
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    const profileData = {
                        username: user,
                        role: "Field Specialist", 
                        pic: `https://api.dicebear.com/7.x/identicon/svg?seed=${user}`,
                        createdAt: serverTimestamp()
                    };
                    await setDoc(doc(db, "users", res.user.uid), profileData);
                    userProfile = profileData;
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { 
                alert("Error: " + err.message); 
            } finally {
                btn.disabled = false;
                btn.innerText = isReg ? "Create Node" : "Initialize Connection";
            }
        }

        function loadPosts(filter = "") {
            const container = document.getElementById('feed-container');
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(30));
            
            onSnapshot(q, (snap) => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(filter && !p.title.toLowerCase().includes(filter.toLowerCase())) return;

                    const card = document.createElement('div');
                    card.className = "card post-card";
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                            <img src="${p.authorPic}" class="avatar">
                            <div>
                                <div style="font-weight:700; font-size:0.9rem;">${p.author}</div>
                                <div style="font-size:0.65rem; color:var(--primary); text-transform:uppercase;">${p.authorRole}</div>
                            </div>
                        </div>
                        <div style="font-weight:800; margin-bottom:8px; color:var(--primary); font-family:'JetBrains Mono'">${p.title}</div>
                        <div style="color:#bbb; font-size:0.95rem; white-space: pre-wrap;">${p.body}</div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            if(!t || !c) return alert("Payload incomplete");
            
            const btn = document.getElementById('btn-publish');
            btn.disabled = true;
            
            try {
                await addDoc(collection(db, "posts"), {
                    title: t, 
                    body: c,
                    author: userProfile.username,
                    authorPic: userProfile.pic, 
                    authorRole: userProfile.role,
                    timestamp: serverTimestamp()
                });
                document.getElementById('post-t').value = "";
                document.getElementById('post-c').value = "";
                showTab('feed');
            } catch (e) { alert("Broadcast failed"); } 
            finally { btn.disabled = false; }
        }

        function renderProfile() {
            if(!userProfile) return;
            const container = document.getElementById('profile-render');
            container.innerHTML = `
                <div class="card" style="text-align:center;">
                    <img src="${userProfile.pic}" style="width:100px; border-radius:20px; border:2px solid var(--primary); margin-bottom:20px;">
                    <h2 style="margin:0;">${userProfile.username}</h2>
                    <p style="color:var(--primary); font-size:0.8rem; letter-spacing:3px;">${userProfile.role}</p>
                </div>
            `;
        }

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                userProfile = userDoc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        document.getElementById('btn-auth').addEventListener('click', handleAuth);
        document.getElementById('toggle-auth-btn').addEventListener('click', () => {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('btn-auth').innerText = isReg ? "Create Node" : "Initialize Connection";
            document.getElementById('auth-toggle-text').innerText = isReg ? "Sign In" : "Register";
        });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
        document.getElementById('l-feed').addEventListener('click', () => showTab('feed'));
        document.getElementById('l-create').addEventListener('click', () => showTab('create'));
        document.getElementById('l-profile').addEventListener('click', () => showTab('profile'));
        document.getElementById('btn-publish').addEventListener('click', publishPost);
        document.getElementById('search-bar').addEventListener('input', (e) => loadPosts(e.target.value));

    </script>
</body>
</html>
