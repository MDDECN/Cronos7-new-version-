<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Research Network</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a2ff; 
            --primary-hover: #0081cc;
            --bg: #0a0a0a; 
            --panel: #141414; 
            --text: #f0f0f0; 
            --text-dim: #999;
            --border: #262626; 
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 24px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.6rem; color: #fff; 
            letter-spacing: -1px; margin-bottom: 50px; display: flex; align-items: center; gap: 10px;
        }
        .logo span { color: var(--primary); }

        .nav-link { 
            padding: 14px 18px; margin: 6px 0; border-radius: 14px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }

        .nav-link:hover { background: #1f1f1f; color: #fff; }
        .nav-link.active { background: rgba(0, 162, 255, 0.1); color: var(--primary); }

        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .container-tight { max-width: 700px; margin: 0 auto; }

        .search-input { 
            width: 100%; background: #1a1a1a; border: 1px solid var(--border); 
            padding: 16px 20px; border-radius: 14px; color: white; outline: none;
            font-size: 0.95rem;
        }
        .search-input:focus { border-color: var(--primary); background: #222; }

        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px; 
            padding: 28px; margin-bottom: 24px;
        }

        .post-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .avatar { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; background: #222; }
        
        .post-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
        .post-body { line-height: 1.7; color: #bbb; margin-bottom: 20px; font-size: 1rem; white-space: pre-wrap; }
        .post-img { width: 100%; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }

        .btn-primary { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-action { 
            background: transparent; border: 1px solid var(--border); color: var(--text-dim); 
            padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600;
        }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 30px 10px; }
            .nav-link span, .logo span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at top right, #111, #050505);">
        <div class="card" style="width:400px;">
            <div class="logo" style="justify-content:center; margin-bottom:30px">CRONOS <span>7</span></div>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="search-input" style="margin-bottom:12px" placeholder="Username">
            </div>
            <input type="email" id="auth-email" class="search-input" style="margin-bottom:12px" placeholder="Email Address">
            <input type="password" id="auth-pass" class="search-input" style="margin-bottom:24px" placeholder="Password">
            <button class="btn-primary" id="btn-auth" onclick="handleAuth()">Enter Terminal</button>
            <p onclick="toggleAuth()" style="text-align:center; color:var(--text-dim); font-size:0.85rem; margin-top:24px; cursor:pointer">
                Don't have an account? <span style="color:var(--primary)">Join the network</span>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <div class="logo">CRONOS<span>7</span></div>
            <div class="nav-link active" id="l-feed" onclick="showTab('feed')"><span>Discovery Feed</span></div>
            <div class="nav-link" id="l-create" onclick="showTab('create')"><span>New Broadcast</span></div>
            <div class="nav-link" id="l-profile" onclick="showTab('profile')"><span>Research Station</span></div>
            <div style="margin-top:auto;">
                <button class="btn-action" onclick="logout()" style="width:100%">Sign Out</button>
            </div>
        </div>

        <div class="main-content">
            <div id="tab-feed" class="container-tight">
                <div class="search-container" style="margin-bottom:40px">
                    <input type="text" id="search-bar" class="search-input" placeholder="Search @researcher..." onkeydown="if(event.key==='Enter') searchUser(this.value)">
                </div>
                <div id="feed-container">Syncing node data...</div>
            </div>

            <div id="tab-create" class="hidden container-tight">
                <div class="card">
                    <h2 style="margin-top:0">Publish Transmission</h2>
                    <input type="text" id="post-t" class="search-input" style="margin-bottom:12px" placeholder="Theory Title">
                    <textarea id="post-c" class="search-input" rows="6" placeholder="Document your technical findings..." style="margin-bottom:12px"></textarea>
                    <button class="btn-primary" onclick="publishPost()" id="btn-publish">Execute Broadcast</button>
                </div>
            </div>

            <div id="tab-profile" class="hidden container-tight">
                <div id="profile-render"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('btn-auth').innerText = isReg ? "Initialize Account" : "Enter Terminal";
        }

        async function handleAuth() {
            const btn = document.getElementById('btn-auth');
            btn.disabled = true;
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(isReg) {
                    const u = document.getElementById('reg-user').value.toLowerCase().trim();
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection("users").doc(res.user.uid).set({
                        username: u, 
                        role: "Lead Researcher", 
                        pic: `https://api.dicebear.com/7.x/bottts/svg?seed=${u}`,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch (err) { alert(err.message); btn.disabled = false; }
        }

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('l-'+id).classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts();
        }

        function loadPosts() {
            const container = document.getElementById('feed-container');
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div class="post-header">
                                <img src="${p.authorPic}" class="avatar">
                                <div>
                                    <div style="font-weight:700">@${p.author}</div>
                                    <div style="font-size:0.75rem; color:var(--primary)">${p.authorRole}</div>
                                </div>
                            </div>
                            <div class="post-title">${p.title}</div>
                            <div class="post-body">${p.body}</div>
                            <button class="btn-action">▲ Endorse</button>
                        </div>`;
                });
            });
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            if(!t || !c) return;
            await db.collection("posts").add({
                title: t, body: c,
                author: userProfile.username, authorId: auth.currentUser.uid,
                authorPic: userProfile.pic, authorRole: userProfile.role,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('post-t').value = "";
            document.getElementById('post-c').value = "";
            showTab('feed');
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const d = await db.collection("users").doc(user.uid).get();
                userProfile = d.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
