<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronos 7 | Research Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00a2ff; 
            --primary-glow: rgba(0, 162, 255, 0.3);
            --bg: #050505; 
            --panel: #0f0f0f; 
            --text: #e0e0e0; 
            --text-dim: #777;
            --border: #1f1f1f; 
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 260px; background: var(--panel); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 30px 20px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        .nav-link { 
            padding: 12px 16px; margin: 4px 0; border-radius: 12px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }

        .nav-link:hover { background: #1a1a1a; color: #fff; transform: translateX(4px); }
        .nav-link.active { background: var(--primary-glow); color: var(--primary); }

        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        .container { max-width: 720px; margin: 0 auto; }

        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px; 
            padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .input-node { 
            width: 100%; background: #161616; border: 1px solid var(--border); 
            padding: 14px 18px; border-radius: 12px; color: white; outline: none;
            margin-bottom: 12px; font-family: inherit;
        }
        .input-node:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }

        .btn-primary { 
            background: var(--primary); color: white; border: none; padding: 14px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 850px) {
            .sidebar { 
                width: 100%; height: 65px; bottom: 0; top: auto;
                flex-direction: row; padding: 0 10px; border-right: none; border-top: 1px solid var(--border);
            }
            .sidebar .logo, .sidebar div[style*="margin-top:auto"] { display: none; }
            .main-content { margin-left: 0; padding: 20px 15px 80px 15px; }
            .nav-link span { display: none; }
            .nav-link::before { font-size: 1.3rem; }
            #l-feed::before { content: "⦿"; }
            #l-create::before { content: "⊕"; }
            #l-profile::before { content: "⏀"; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at center, #111 0%, #000 100%);">
        <div class="card" style="width:380px; text-align: center;">
            <div class="logo">CRONOS<span>7</span></div>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="input-node" placeholder="Researcher Alias">
            </div>
            <input type="email" id="auth-email" class="input-node" placeholder="Node Email">
            <input type="password" id="auth-pass" class="input-node" placeholder="Access Key">
            <button class="btn-primary" id="btn-auth" onclick="handleAuth()">Access Network</button>
            <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:0.8rem; margin-top:20px; cursor:pointer">
                Switch protocol: <span style="color:var(--primary)" id="auth-toggle-text">Create Account</span>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="sidebar">
            <div class="logo">CRONOS<span>7</span></div>
            <div class="nav-link active" id="l-feed" onclick="showTab('feed')"><span>Feed</span></div>
            <div class="nav-link" id="l-create" onclick="showTab('create')"><span>Broadcast</span></div>
            <div class="nav-link" id="l-profile" onclick="showTab('profile')"><span>Station</span></div>
            <div style="margin-top:auto;">
                <button class="btn-primary" style="background:#cc000022; color:#ff4444" onclick="logout()">Terminate</button>
            </div>
        </nav>

        <main class="main-content container">
            <div id="tab-feed">
                <input type="text" id="search-bar" class="input-node" placeholder="Search data nodes..." oninput="filterPosts(this.value)">
                <div id="feed-container">Syncing...</div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin-top:0">New Transmission</h3>
                    <input type="text" id="post-t" class="input-node" placeholder="Theory Identifier">
                    <textarea id="post-c" class="input-node" rows="6" placeholder="Encryption payload..."></textarea>
                    <button class="btn-primary" onclick="publishPost()" id="btn-publish">Send Broadcast</button>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div id="profile-render" class="card"></div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('btn-auth').innerText = isReg ? "Initialize Node" : "Access Network";
            document.getElementById('auth-toggle-text').innerText = isReg ? "Sign In" : "Create Account";
        }

        async function handleAuth() {
            const btn = document.getElementById('btn-auth');
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            
            if(!e || !p) return alert("Fill all data nodes.");
            
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            try {
                if(isReg) {
                    const u = document.getElementById('reg-user').value.trim();
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection("users").doc(res.user.uid).set({
                        username: u || "Unknown Researcher",
                        role: "Lead Researcher", 
                        pic: `https://api.dicebear.com/7.x/identicon/svg?seed=${u}`,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch (err) { 
                alert(err.message); 
                btn.disabled = false;
                btn.innerText = "Retry Access";
            }
        }

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('l-'+id).classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts();
            if(t === 'profile') renderProfile();
        }

        function loadPosts() {
            const container = document.getElementById('feed-container');
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                container.innerHTML = snap.empty ? "No data found." : "";
                snap.forEach(doc => {
                    const p = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px">
                                <img src="${p.authorPic}" style="width:40px; height:40px; border-radius:8px; border:1px solid var(--border)">
                                <div>
                                    <div style="font-weight:700; color:#fff">@${p.author}</div>
                                    <div style="font-size:0.7rem; color:var(--primary)">${p.authorRole}</div>
                                </div>
                            </div>
                            <div style="font-weight:800; margin-bottom:8px; font-size:1.1rem">${p.title}</div>
                            <div style="color:#aaa; font-size:0.9rem; line-height:1.6">${p.body}</div>
                        </div>`;
                });
            });
        }

        function renderProfile() {
            const container = document.getElementById('profile-render');
            container.innerHTML = `
                <div style="text-align:center">
                    <img src="${userProfile.pic}" style="width:80px; margin-bottom:15px; border-radius:20px; border:2px solid var(--primary)">
                    <h2 style="margin:0">@${userProfile.username}</h2>
                    <p style="color:var(--primary)">${userProfile.role}</p>
                    <div style="border-top:1px solid var(--border); margin-top:20px; padding-top:20px; font-size:0.8rem; color:var(--text-dim)">
                        Node Status: Operational<br>
                        Location: Unknown Node
                    </div>
                </div>
            `;
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            if(!t || !c) return alert("Empty payload.");
            
            const btn = document.getElementById('btn-publish');
            btn.disabled = true;
            
            try {
                await db.collection("posts").add({
                    title: t, body: c,
                    author: userProfile.username,
                    authorPic: userProfile.pic, 
                    authorRole: userProfile.role,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('post-t').value = "";
                document.getElementById('post-c').value = "";
                showTab('feed');
            } catch (e) { alert("Broadcast failed."); }
            btn.disabled = false;
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const d = await db.collection("users").doc(user.uid).get();
                userProfile = d.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
