<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRONOS 7 | Advanced Research Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00e5ff; 
            --primary-glow: rgba(0, 229, 255, 0.2);
            --bg: #050505; 
            --panel: rgba(20, 20, 20, 0.8); 
            --text: #ffffff; 
            --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1); 
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
            line-height: 1.6;
        }

        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 280px; background: var(--panel); 
            backdrop-filter: blur(15px); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 20px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 50px;
            text-align: center; color: #fff; text-transform: uppercase;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        .nav-link { 
            padding: 16px 20px; margin: 8px 0; border-radius: 16px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 12px; border: 1px solid transparent;
        }

        .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--primary); transform: translateX(5px); }
        .nav-link.active { 
            background: var(--primary-glow); color: var(--primary); 
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; position: relative; }
        .container { max-width: 850px; margin: 0 auto; }

        .card { 
            background: var(--panel); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 24px; 
            padding: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-node { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            padding: 18px; border-radius: 16px; color: white; outline: none;
            margin-bottom: 18px; font-family: inherit; font-size: 1rem;
        }
        .input-node:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); box-shadow: 0 0 15px var(--primary-glow); }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #0088ff); color: #000; border: none; padding: 18px; 
            border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .btn-primary:hover { filter: brightness(1.2); transform: scale(1.02); box-shadow: 0 0 25px var(--primary); }
        .btn-primary:active { transform: scale(0.98); }

        .post-card { 
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            border-left: 4px solid var(--primary);
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .avatar { width: 50px; height: 50px; border-radius: 14px; border: 2px solid var(--primary); padding: 2px; background: #000; }
        
        @media (max-width: 850px) {
            .sidebar { 
                width: 100%; height: 80px; bottom: 0; top: auto;
                flex-direction: row; padding: 0 10px; border-right: none; border-top: 1px solid var(--border);
                justify-content: space-around; align-items: center; border-radius: 20px 20px 0 0;
            }
            .sidebar .logo, .sidebar .logout-box { display: none; }
            .main-content { margin-left: 0; padding: 20px 15px 100px 15px; }
            .nav-link span { display: none; }
            .nav-link::before { font-size: 1.8rem; }
            #l-feed::before { content: "⚡"; }
            #l-create::before { content: "➕"; }
            #l-profile::before { content: "👤"; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="auth-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="card" style="width:100%; max-width:420px; text-align: center;">
            <div class="logo">CRONOS<span>7</span></div>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="input-node" placeholder="Researcher Alias">
            </div>
            <input type="email" id="auth-email" class="input-node" placeholder="Node Email">
            <input type="password" id="auth-pass" class="input-node" placeholder="Access Key">
            <button class="btn-primary" id="btn-auth" onclick="handleAuth()">Access Network</button>
            <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:0.9rem; margin-top:25px; cursor:pointer">
                Protocol: <span style="color:var(--primary)" id="auth-toggle-text">Register New Node</span>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="sidebar">
            <div class="logo">CRONOS<span>7</span></div>
            <div class="nav-link active" id="l-feed" onclick="showTab('feed')"><span>Data Stream</span></div>
            <div class="nav-link" id="l-create" onclick="showTab('create')"><span>New Broadcast</span></div>
            <div class="nav-link" id="l-profile" onclick="showTab('profile')"><span>Base Station</span></div>
            <div class="logout-box" style="margin-top:auto; width: 100%;">
                <button class="btn-primary" style="background:rgba(255, 68, 68, 0.1); color:#ff4444; border: 1px solid #ff444433; font-size: 0.7rem;" onclick="logout()">TERMINATE</button>
            </div>
        </nav>

        <main class="main-content container">
            <div id="tab-feed">
                <div style="margin-bottom: 30px;">
                    <input type="text" id="search-bar" class="input-node" placeholder="Filter transmissions..." oninput="loadPosts(this.value)">
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin-top:0; margin-bottom:25px; color: var(--primary);">Prepare Transmission</h3>
                    <input type="text" id="post-t" class="input-node" placeholder="Broadcast Subject">
                    <textarea id="post-c" class="input-node" rows="6" placeholder="Encryption payload content..."></textarea>
                    <button class="btn-primary" onclick="publishPost()" id="btn-publish">Execute Broadcast</button>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div id="profile-render" class="card"></div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const emojis = ['🥹','🙂','🤣','😂','🤥','🙏','🥰','✊️','✨','⚡','🔥'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 20 + 10;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        function initParticles() {
            for (let i = 0; i < 40; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();

        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('btn-auth').innerText = isReg ? "Initialize Node" : "Access Network";
            document.getElementById('auth-toggle-text').innerText = isReg ? "Sign In" : "Register Account";
        }

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                const link = document.getElementById('l-'+id);
                if(link) link.classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts();
            if(t === 'profile') renderProfile();
        }

        async function handleAuth() {
            const btn = document.getElementById('btn-auth');
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return;
            
            btn.disabled = true;
            btn.innerText = "Connecting...";
            
            try {
                if(isReg) {
                    const user = document.getElementById('reg-user').value.trim() || "Researcher";
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const profileData = {
                        username: user,
                        role: "Field Researcher", 
                        pic: `https://api.dicebear.com/7.x/bottts/svg?seed=${user}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection("users").doc(res.user.uid).set(profileData);
                    userProfile = profileData;
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (err) { 
                alert("Protocol Error: " + err.message); 
                btn.disabled = false;
                btn.innerText = "Retry Access";
            }
        }

        function loadPosts(filter = "") {
            const container = document.getElementById('feed-container');
            db.collection("posts").orderBy("timestamp", "desc").limit(30).onSnapshot(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(filter && !p.title.toLowerCase().includes(filter.toLowerCase())) return;

                    const card = document.createElement('div');
                    card.className = "card post-card";
                    card.innerHTML = `
                        <div class="post-header" style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                            <img src="${p.authorPic}" class="avatar">
                            <div>
                                <div style="font-weight:800; color:#fff">@${p.author}</div>
                                <div style="font-size:0.75rem; color:var(--primary); font-weight:600; text-transform:uppercase">${p.authorRole}</div>
                            </div>
                        </div>
                        <div style="font-weight:800; margin-bottom:12px; font-size:1.3rem; color:var(--primary)">${p.title}</div>
                        <div style="color:#d0d0d0; font-size:1rem; line-height:1.8">${p.body}</div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            if(!t || !c) return;
            
            const btn = document.getElementById('btn-publish');
            btn.disabled = true;
            btn.innerText = "Broadcasting...";
            
            try {
                await db.collection("posts").add({
                    title: t, body: c,
                    author: userProfile.username,
                    authorPic: userProfile.pic, 
                    authorRole: userProfile.role,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('post-t').value = "";
                document.getElementById('post-c').value = "";
                showTab('feed');
            } catch (e) { alert("Broadcast Failure"); } 
            finally { btn.disabled = false; btn.innerText = "Execute Broadcast"; }
        }

        function renderProfile() {
            if(!userProfile) return;
            const container = document.getElementById('profile-render');
            container.innerHTML = `
                <div style="text-align:center;">
                    <img src="${userProfile.pic}" style="width:120px; height:120px; margin-bottom:25px; border-radius:30px; border:4px solid var(--primary); box-shadow: 0 0 30px var(--primary-glow);">
                    <h2 style="margin:0; font-size:2rem;">@${userProfile.username}</h2>
                    <p style="color:var(--primary); font-weight:600; letter-spacing:2px;">${userProfile.role}</p>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top:40px;">
                        <div class="card" style="margin:0; padding:20px; background:rgba(255,255,255,0.03);">
                            <div style="font-size:0.7rem; color:var(--text-dim)">STATUS</div>
                            <div style="color:#00ff88; font-weight:800">OPERATIONAL</div>
                        </div>
                        <div class="card" style="margin:0; padding:20px; background:rgba(255,255,255,0.03);">
                            <div style="font-size:0.7rem; color:var(--text-dim)">ENCRYPTION</div>
                            <div style="color:var(--primary); font-weight:800">AES-256</div>
                        </div>
                    </div>
                </div>
            `;
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                userProfile = doc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function logout() { if(confirm("Terminate connection?")) auth.signOut(); }
    </script>
</body>
</html>
