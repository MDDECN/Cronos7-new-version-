<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Professional Network</title>
    <link rel="icon" type="image/jpeg" href="IMG-20260302-WA0005.jpg">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --primary: #00a2ff; --bg: #050505; --panel: #111; --text: #fff; --border: #222; 
            --dev: #ff4757; --art: #ffa502; --science: #2ed573; --phil: #a29bfe; --danger: #ff4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; width: 280px; position: fixed; height: 100vh; z-index: 100; }
        .logo-img { width: 100px; mix-blend-mode: lighten; margin-bottom: 20px; align-self: center; }
        .nav-link { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #aaa; transition: 0.2s; font-weight: 500; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .content { margin-left: 280px; padding: 40px; background: #080808; min-height: 100vh; }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 30px; }
        .search-container input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 30px; outline: none; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .delete-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 11px; font-weight: bold; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; }

        .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: #222; object-fit: cover; border: 2px solid var(--border); }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .badge-dev { background: var(--dev); }
        .badge-art { background: var(--art); }
        .badge-science { background: var(--science); }
        .badge-phil { background: var(--phil); }
        
        .author-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .author-meta { flex-grow: 1; }
        .author-name { font-weight: bold; font-size: 1.1rem; color: var(--text); }
        .author-role { color: #666; font-size: 0.85rem; display: block; }
        
        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }

        .auth-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid var(--border); }
        .toggle-auth { margin-top: 15px; color: var(--primary); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img">
            <h1 id="auth-title">ACCESS STATION</h1>
            <div id="register-fields" class="hidden">
                <input type="text" id="reg-username" placeholder="Unique Professional Handle (@)">
            </div>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn-main" id="auth-btn" style="width:100%" onclick="handleAuth()">LOGIN</button>
            <p id="auth-error" style="color:var(--danger); font-size:12px; margin-top:10px;"></p>
            <p class="toggle-auth" id="auth-toggle-text" onclick="toggleAuthMode()">New researcher? Create account</p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img">
            <div class="nav-link active" id="link-feed" onclick="showTab('feed')">RESEARCH FEED</div>
            <div class="nav-link" id="link-create" onclick="showTab('create')">BROADCAST</div>
            <div class="nav-link" id="link-profile" onclick="showTab('profile')">MY STATION</div>
            <button class="btn-main" onclick="logout()" style="margin-top:auto; background:#222">DISCONNECT</button>
        </div>

        <div class="content">
            <div id="tab-feed">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search by name, role or title..." onkeyup="filterFeed()">
                </div>
                <div id="posts-container">Establishing secure link...</div>
            </div>

            <div id="tab-create" class="hidden">
                <h1>New Transmission</h1>
                <input type="text" id="post-title" placeholder="Research/Project Title">
                <select id="post-category">
                    <option value="science">Physics / Mathematics</option>
                    <option value="dev">Software Engineering</option>
                    <option value="art">Arts / Cinema</option>
                    <option value="phil">Philosophy</option>
                </select>
                <textarea id="post-content" rows="10" placeholder="Describe your findings or work snippet..."></textarea>
                <button class="btn-main" onclick="publishPost()">BROADCAST DATA</button>
            </div>

            <div id="tab-profile" class="hidden">
                <div style="text-align: center; margin-bottom: 30px;">
                    <img id="prof-pic-display" src="" class="user-avatar" style="width: 110px; height: 110px; border: 4px solid var(--primary);">
                    <h2 id="prof-user"></h2>
                    <p id="prof-role-display" style="color: var(--primary); font-weight: bold;"></p>
                </div>
                <h3>Settings</h3>
                <input type="text" id="edit-pic" placeholder="Profile Picture URL">
                <input type="text" id="edit-role" placeholder="Professional Title">
                <textarea id="edit-bio" placeholder="Professional Bio..."></textarea>
                <button class="btn-main" onclick="updateProfile()">UPDATE STATION</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let isRegisterMode = false;
        let userProfile = null;
        let allPosts = [];

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').innerText = isRegisterMode ? "REGISTER" : "ACCESS STATION";
            document.getElementById('register-fields').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('auth-btn').innerText = isRegisterMode ? "CREATE ACCOUNT" : "LOGIN";
            document.getElementById('auth-toggle-text').innerText = isRegisterMode ? "Already a member? Login" : "New researcher? Create account";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.innerText = "";

            if (isRegisterMode) {
                const username = document.getElementById('reg-username').value.trim().toLowerCase();
                if (username.length < 3) return errorEl.innerText = "Username too short.";
                if (pass.length < 6) return errorEl.innerText = "Password must be 6+ chars.";
                if (pass === username) return errorEl.innerText = "Password cannot be username.";

                const nameCheck = await db.collection("users").where("username", "==", username).get();
                if (!nameCheck.empty) return errorEl.innerText = "Username taken.";

                try {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("users").doc(res.user.uid).set({
                        username: username, role: "Specialist", pic: "https://via.placeholder.com/110", bio: ""
                    });
                } catch (e) { errorEl.innerText = e.message; }
            } else {
                try { await auth.signInWithEmailAndPassword(email, pass); } 
                catch (e) { errorEl.innerText = "Authentication failed."; }
            }
        }

        async function deletePost(id) {
            if(confirm("Confirm deletion?")) await db.collection("posts").doc(id).delete();
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const cat = document.getElementById('post-category').value;
            const body = document.getElementById('post-content').value;
            if(!title || !body) return;
            await db.collection("posts").add({
                title, body, category: cat, author: userProfile.username,
                authorId: auth.currentUser.uid, authorRole: userProfile.role,
                authorPic: userProfile.pic, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showTab('feed');
        }

        async function updateProfile() {
            const pic = document.getElementById('edit-pic').value;
            const bio = document.getElementById('edit-bio').value;
            const role = document.getElementById('edit-role').value;
            await db.collection("users").doc(auth.currentUser.uid).update({ 
                pic: pic || userProfile.pic, bio: bio || userProfile.bio, role: role || userProfile.role 
            });
            location.reload();
        }

        function filterFeed() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPosts.filter(d => {
                const p = d.data();
                return p.author.toLowerCase().includes(q) || p.authorRole.toLowerCase().includes(q) || p.title.toLowerCase().includes(q);
            });
            renderPosts(filtered);
        }

        function renderPosts(docs) {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            docs.forEach(d => {
                const p = d.data();
                const isMe = p.authorId === auth.currentUser.uid;
                container.innerHTML += `
                    <div class="card">
                        ${isMe ? `<button class="delete-btn" onclick="deletePost('${d.id}')">Delete</button>` : ''}
                        <div class="author-row">
                            <img src="${p.authorPic}" class="user-avatar">
                            <div class="author-meta">
                                <span class="author-name">@${p.author}</span>
                                <span class="author-role">${p.authorRole}</span>
                            </div>
                        </div>
                        <span class="badge badge-${p.category}">${p.category}</span>
                        <div style="font-weight:bold; color:var(--primary); margin-bottom:5px;">${p.title}</div>
                        <p style="white-space:pre-wrap; color:#ccc; margin:0;">${p.body}</p>
                    </div>`;
            });
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                userProfile = doc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('prof-user').innerText = "@" + userProfile.username;
                document.getElementById('prof-role-display').innerText = userProfile.role;
                document.getElementById('prof-pic-display').src = userProfile.pic;
                
                db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                    allPosts = snap.docs;
                    filterFeed();
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('link-'+id).classList.toggle('active', id === t);
            });
        }
        function logout() { auth.signOut(); }
    </script>
</body>
</html>
