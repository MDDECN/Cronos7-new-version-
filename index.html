<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Social  job Network & Research Network</title>
    <link rel="icon" type="image/jpeg" href="IMG-20260302-WA0005.jpg">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #00a2ff; --bg: #050505; --panel: #111; --text: #fff; --border: #222; --accent: #8a2be2; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; width: 280px; position: fixed; height: 100vh; }
        .logo-img { width: 120px; mix-blend-mode: lighten; margin-bottom: 20px; align-self: center; }
        .nav-link { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--primary); color: #fff; font-weight: bold; }

        .content { margin-left: 280px; padding: 40px; background: #080808; min-height: 100vh; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 25px; position: relative; }
        .theory-tag { background: var(--accent); color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .post-title { color: var(--primary); font-size: 1.4rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .author-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .follow-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .follow-btn.following { background: var(--primary); color: white; }

        .profile-header { background: linear-gradient(45deg, #111, #222); padding: 30px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; }
        
        .btn-main { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; }

        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img" style="width: 100px;">
            <h1>CRONOS 7</h1>
            <input type="text" id="reg-name" placeholder="Unique Username">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password (6+ chars)">
            <button class="btn-main" onclick="handleAuth()" style="width:100%">ACCESS SYSTEM</button>
            <p id="auth-error" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img">
            <div class="nav-link active" id="link-feed" onclick="showTab('feed')">RESEARCH FEED</div>
            <div class="nav-link" id="link-create" onclick="showTab('create')">SUBMIT THEORY</div>
            <div class="nav-link" id="link-profile" onclick="showTab('profile')">MY STATION (PROFILE)</div>
            <button class="btn-main" onclick="logout()" style="margin-top:auto; background:#333">LOGOUT</button>
        </div>

        <div class="content">
            <div id="tab-feed">
                <h1>Theoretical Feed</h1>
                <div id="posts-container">Scanning frequencies...</div>
            </div>

            <div id="tab-create" class="hidden">
                <h1>New Physics Theory</h1>
                <input type="text" id="post-title" placeholder="Theory Title (e.g. Quantum Gravity Observations)">
                <textarea id="post-content" rows="10" placeholder="Describe your findings or formulas here..."></textarea>
                <label><input type="checkbox" id="is-theory" checked> Tag as Scientific Theory</label><br><br>
                <button class="btn-main" onclick="publishPost()">BROADCAST DATA</button>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="profile-header">
                    <h2 id="prof-user">@username</h2>
                    <p id="prof-bio" style="color:#888">No bio established.</p>
                </div>
                <h3>Edit Profile</h3>
                <textarea id="edit-bio" placeholder="Researcher Bio / Field of Study"></textarea>
                <button class="btn-main" onclick="updateProfile()">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let following = [];

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('reg-name').value.trim();
            try {
                await auth.signInWithEmailAndPassword(email, pass).catch(async (err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                        if(!name) throw new Error("Enter a username to register.");
                        const newUser = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(newUser.user.uid).set({ 
                            username: name, bio: "Physics Researcher", joined: new Date().toISOString() 
                        });
                    } else throw err;
                });
            } catch (e) { document.getElementById('auth-error').innerText = e.message; }
        }

        async function updateProfile() {
            const newBio = document.getElementById('edit-bio').value;
            await db.collection("users").doc(auth.currentUser.uid).update({ bio: newBio });
            alert("Station Profile Updated!");
            location.reload();
        }

        async function toggleFollow(targetId) {
            const myId = auth.currentUser.uid;
            const ref = db.collection("follows").doc(`${myId}_${targetId}`);
            const doc = await ref.get();
            if(doc.exists) {
                await ref.delete();
            } else {
                await ref.set({ follower: myId, following: targetId });
            }
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const body = document.getElementById('post-content').value;
            const isTheory = document.getElementById('is-theory').checked;
            if(!title || !body) return alert("Data fields cannot be empty.");

            await db.collection("posts").add({
                title, body, isTheory,
                author: userProfile.username,
                authorId: auth.currentUser.uid,
                likes: 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showTab('feed');
        }

        function loadFeed() {
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(async snap => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                
                const fSnap = await db.collection("follows").where("follower", "==", auth.currentUser.uid).get();
                following = fSnap.docs.map(d => d.data().following);

                snap.forEach(doc => {
                    const post = doc.data();
                    const id = doc.id;
                    const isFollowing = following.includes(post.authorId);
                    const isMe = post.authorId === auth.currentUser.uid;

                    container.innerHTML += `
                        <div class="card">
                            ${post.isTheory ? '<span class="theory-tag">Physics Theory</span>' : ''}
                            <span class="post-title">${post.title}</span>
                            <div class="author-box">
                                <b>@${post.author}</b>
                                ${!isMe ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${post.authorId}')">
                                    ${isFollowing ? 'Following' : 'Follow'}
                                </button>` : ''}
                            </div>
                            <p style="white-space: pre-wrap; color:#ccc">${post.body}</p>
                            <button class="action-btn" onclick="likePost('${id}', ${post.likes})">👍 ${post.likes}</button>
                        </div>`;
                });
            });
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                userProfile = doc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('prof-user').innerText = "@" + userProfile.username;
                document.getElementById('prof-bio').innerText = userProfile.bio;
                loadFeed();
            }
        });

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('link-'+id).classList.toggle('active', id === t);
            });
        }
        function logout() { auth.signOut().then(() => location.reload()); }
        async function likePost(id, c) { await db.collection("posts").doc(id).update({ likes: c + 1 }); }
    </script>
</body>
</html>
