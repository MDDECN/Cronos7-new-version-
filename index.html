<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRONOS 7 | Neural Research Network</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --primary: #00f2ff; 
            --primary-glow: rgba(0, 242, 255, 0.15);
            --bg: #050508; 
            --panel: rgba(18, 18, 24, 0.75); 
            --text: #f8f9fa; 
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08); 
            --error: #ff5f5f;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        #particle-canvas {
            position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.4;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 300px; background: var(--panel); 
            backdrop-filter: blur(30px); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 24px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 60px;
            text-align: left; color: #fff; font-family: 'JetBrains Mono', monospace;
            display: flex; align-items: center; gap: 10px;
        }
        .logo i { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }

        .nav-link { 
            padding: 16px 20px; border-radius: var(--radius-md); cursor: pointer;
            color: var(--text-dim); font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 15px; border: 1px solid transparent;
        }

        .nav-link i { font-size: 1.2rem; }
        .nav-link:hover:not(.active) { background: rgba(255, 255, 255, 0.03); color: #fff; border-color: var(--border); }
        .nav-link.active { 
            background: var(--primary-glow); color: var(--primary); 
            border-color: rgba(0, 242, 255, 0.2);
        }

        .main-content { margin-left: 300px; padding: 60px 40px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }

        .header-action {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
        }

        .card { 
            background: var(--panel); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: var(--radius-lg); 
            padding: 30px; position: relative; overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
        }

        .input-node { 
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); 
            padding: 16px 20px; border-radius: var(--radius-md); color: white; outline: none;
            margin-bottom: 20px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem;
        }
        .input-node:focus { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); background: rgba(0,0,0,0.4); }

        .btn-primary { 
            background: var(--primary); color: #000; border: none; padding: 18px; 
            border-radius: var(--radius-md); font-weight: 800; cursor: pointer; width: 100%;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); filter: brightness(1.1); }

        .post-card { 
            margin-bottom: 25px; animation: reveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }

        @keyframes reveal { 
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .avatar-frame {
            position: relative; padding: 3px; background: linear-gradient(45deg, var(--primary), transparent);
            border-radius: 12px; width: 50px; height: 50px;
        }
        .avatar { width: 100%; height: 100%; border-radius: 9px; object-fit: cover; background: #111; }

        @media (max-width: 900px) {
            .sidebar { 
                width: 100%; height: 75px; bottom: 0; top: auto;
                flex-direction: row; padding: 0 15px; border-right: none; border-top: 1px solid var(--border);
                justify-content: space-around; border-radius: 0;
            }
            .sidebar .logo, .sidebar .logout-box { display: none; }
            .main-content { margin-left: 0; padding: 30px 20px 100px 20px; }
            .nav-link { padding: 10px; flex-direction: column; gap: 4px; font-size: 0.6rem; }
            .nav-link i { font-size: 1.4rem; }
            .nav-link span { display: block; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="auth-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 25px;">
        <div class="card" style="max-width:450px; width:100%;">
            <div class="logo" style="justify-content:center; font-size: 2rem;">
                <i class="fas fa-microchip"></i> CRONOS<span>7</span>
            </div>
            <p style="text-align:center; color:var(--text-dim); margin-top:-40px; margin-bottom:40px; font-size:0.9rem;">Quantum Research Interface v4.0</p>
            
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="input-node" placeholder="Researcher Alias">
            </div>
            <input type="email" id="auth-email" class="input-node" placeholder="Network Email">
            <input type="password" id="auth-pass" class="input-node" placeholder="Security Key">
            
            <button class="btn-primary" id="btn-auth">
                <i class="fas fa-shield-halved"></i> <span>Initialize Connection</span>
            </button>
            
            <div id="toggle-auth-btn" style="margin-top:25px; text-align:center; cursor:pointer">
                <span style="color:var(--text-dim); font-size:0.85rem;">Protocol Override:</span> 
                <span style="color:var(--primary); font-weight:700; font-size:0.85rem;" id="auth-toggle-text">New Registration</span>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="sidebar">
            <div class="logo"><i class="fas fa-microchip"></i> CRONOS<span>7</span></div>
            
            <div class="nav-group">
                <div class="nav-link active" id="l-feed"><i class="fas fa-satellite-dish"></i> <span>Global Stream</span></div>
                <div class="nav-link" id="l-create"><i class="fas fa-paper-plane"></i> <span>Broadcast</span></div>
                <div class="nav-link" id="l-profile"><i class="fas fa-user-gear"></i> <span>My Station</span></div>
            </div>

            <div class="logout-box" style="margin-top:auto;">
                <button id="logout-btn" class="btn-primary" style="background:rgba(255, 95, 95, 0.1); color:var(--error); border: 1px solid rgba(255, 95, 95, 0.2); font-size: 0.75rem;">
                    <i class="fas fa-power-off"></i> TERMINATE
                </button>
            </div>
        </nav>

        <main class="main-content container">
            <div id="tab-feed">
                <div class="header-action">
                    <h2 style="margin:0; font-weight:800; font-size:1.8rem;">Research <span style="color:var(--primary)">Stream</span></h2>
                    <div style="position:relative; width: 300px;">
                        <i class="fas fa-search" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-dim);"></i>
                        <input type="text" id="search-bar" class="input-node" placeholder="Filter packets..." style="margin-bottom:0; padding-left:45px; border-radius:30px;">
                    </div>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin:0 0 25px 0; color: var(--primary); font-weight:800; letter-spacing:1px;">NEW BROADCAST</h3>
                    <input type="text" id="post-t" class="input-node" placeholder="Transmission Subject">
                    <textarea id="post-c" class="input-node" rows="6" placeholder="Identify data payload..."></textarea>
                    <button class="btn-primary" id="btn-publish">
                        <i class="fas fa-tower-broadcast"></i> TRANSMIT DATA
                    </button>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div id="profile-render"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.firebasestorage.app",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;
        let isReg = false;

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random();
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new Particle());
        const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        };
        animate();

        const ui = {
            showTab: (t) => {
                ['feed', 'create', 'profile'].forEach(id => {
                    document.getElementById(`tab-${id}`).classList.toggle('hidden', id !== t);
                    const link = document.getElementById(`l-${id}`);
                    if(link) link.classList.toggle('active', id === t);
                });
                if(t === 'feed') methods.loadPosts();
                if(t === 'profile') methods.renderProfile();
            }
        };

        const methods = {
            async handleAuth() {
                const btn = document.querySelector('#btn-auth span');
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-pass').value;
                if(!email || !pass) return;
                
                btn.innerText = "AUTHENTICATING...";
                try {
                    if(isReg) {
                        const user = document.getElementById('reg-user').value.trim() || "Anonymous";
                        const res = await createUserWithEmailAndPassword(auth, email, pass);
                        const profileData = {
                            username: user,
                            role: "Field Researcher", 
                            pic: `https://api.dicebear.com/7.x/bottts/svg?seed=${user}`,
                            createdAt: serverTimestamp()
                        };
                        await setDoc(doc(db, "users", res.user.uid), profileData);
                        userProfile = profileData;
                    } else {
                        await signInWithEmailAndPassword(auth, email, pass);
                    }
                } catch (err) { alert(err.message); } 
                finally { btn.innerText = isReg ? "CREATE NODE" : "INITIALIZE CONNECTION"; }
            },

            loadPosts(filter = "") {
                const container = document.getElementById('feed-container');
                const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(25));
                onSnapshot(q, (snap) => {
                    container.innerHTML = "";
                    snap.forEach(doc => {
                        const p = doc.data();
                        if(filter && !p.title.toLowerCase().includes(filter.toLowerCase())) return;
                        
                        const el = document.createElement('div');
                        el.className = "card post-card";
                        el.innerHTML = `
                            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                                <div class="avatar-frame"><img src="${p.authorPic}" class="avatar"></div>
                                <div>
                                    <div style="font-weight:800; font-size:1rem; letter-spacing:0.5px;">${p.author}</div>
                                    <div style="font-size:0.65rem; color:var(--primary); text-transform:uppercase; font-weight:700; letter-spacing:2px;">${p.authorRole}</div>
                                </div>
                            </div>
                            <div style="font-weight:800; margin-bottom:12px; color:var(--primary); font-family:'JetBrains Mono'; font-size:1.1rem;"># ${p.title}</div>
                            <div style="color:var(--text-dim); font-size:1rem; line-height:1.7; font-weight:400;">${p.body}</div>
                            <div style="margin-top:20px; font-size:0.6rem; color:rgba(255,255,255,0.2); font-family:'JetBrains Mono';">PACKET_ID: ${doc.id.substring(0,8)}</div>
                        `;
                        container.appendChild(el);
                    });
                });
            },

            async publishPost() {
                const t = document.getElementById('post-t').value;
                const c = document.getElementById('post-c').value;
                if(!t || !c) return;
                
                try {
                    await addDoc(collection(db, "posts"), {
                        title: t, body: c,
                        author: userProfile.username,
                        authorPic: userProfile.pic, 
                        authorRole: userProfile.role,
                        timestamp: serverTimestamp()
                    });
                    document.getElementById('post-t').value = "";
                    document.getElementById('post-c').value = "";
                    ui.showTab('feed');
                } catch (e) { console.error(e); }
            },

            renderProfile() {
                if(!userProfile) return;
                document.getElementById('profile-render').innerHTML = `
                    <div class="card" style="text-align:center; padding: 60px 20px;">
                        <div class="avatar-frame" style="width:120px; height:120px; margin: 0 auto 25px;">
                            <img src="${userProfile.pic}" class="avatar" style="border-radius:20px;">
                        </div>
                        <h2 style="margin:0; font-size:2rem; font-weight:800;">${userProfile.username}</h2>
                        <p style="color:var(--primary); font-size:0.8rem; letter-spacing:4px; font-weight:700; margin-top:10px; text-transform:uppercase;">${userProfile.role}</p>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top:40px; max-width:400px; margin-left:auto; margin-right:auto;">
                            <div class="card" style="padding:15px; background:rgba(255,255,255,0.02)">
                                <div style="font-size:0.6rem; color:var(--text-dim);">STATUS</div>
                                <div style="color:var(--primary); font-weight:800;">ACTIVE</div>
                            </div>
                            <div class="card" style="padding:15px; background:rgba(255,255,255,0.02)">
                                <div style="font-size:0.6rem; color:var(--text-dim);">LEVEL</div>
                                <div style="color:var(--primary); font-weight:800;">ELITE</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                userProfile = userDoc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                ui.showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        document.getElementById('btn-auth').addEventListener('click', methods.handleAuth);
        document.getElementById('toggle-auth-btn').addEventListener('click', () => {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.querySelector('#btn-auth span').innerText = isReg ? "CREATE NODE" : "INITIALIZE CONNECTION";
            document.getElementById('auth-toggle-text').innerText = isReg ? "Sign In" : "Register";
        });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
        document.getElementById('l-feed').addEventListener('click', () => ui.showTab('feed'));
        document.getElementById('l-create').addEventListener('click', () => ui.showTab('create'));
        document.getElementById('l-profile').addEventListener('click', () => ui.showTab('profile'));
        document.getElementById('btn-publish').addEventListener('click', methods.publishPost);
        document.getElementById('search-bar').addEventListener('input', (e) => methods.loadPosts(e.target.value));

    </script>
</body>
</html>
