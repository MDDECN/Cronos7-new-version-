<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRONOS 7 | Research Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00a2ff; 
            --primary-glow: rgba(0, 162, 255, 0.15);
            --bg: #080808; 
            --panel: #111111; 
            --text: #f0f0f0; 
            --text-dim: #888;
            --border: #222; 
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
            line-height: 1.6;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 280px; background: var(--panel); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 20px;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; margin-bottom: 50px;
            text-align: center; color: #fff;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }

        .nav-link { 
            padding: 14px 20px; margin: 6px 0; border-radius: 12px; cursor: pointer;
            color: var(--text-dim); font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 12px;
        }

        .nav-link:hover { background: #1a1a1a; color: var(--primary); }
        .nav-link.active { background: var(--primary-glow); color: var(--primary); border: 1px solid #00a2ff33; }

        .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }

        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px; 
            padding: 24px; margin-bottom: 24px;
        }

        .input-node { 
            width: 100%; background: #181818; border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; color: white; outline: none;
            margin-bottom: 15px; font-family: inherit; font-size: 1rem;
        }
        .input-node:focus { border-color: var(--primary); background: #1a1a1a; }

        .btn-primary { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .post-card { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .avatar { width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--border); object-fit: cover; }
        
        @media (max-width: 850px) {
            .sidebar { 
                width: 100%; height: 70px; bottom: 0; top: auto;
                flex-direction: row; padding: 0 15px; border-right: none; border-top: 1px solid var(--border);
                justify-content: space-around; align-items: center;
            }
            .sidebar .logo, .sidebar .logout-box { display: none; }
            .main-content { margin-left: 0; padding: 20px 15px 100px 15px; }
            .nav-link span { display: none; }
            .nav-link::before { font-size: 1.5rem; }
            #l-feed::before { content: "◈"; }
            #l-create::before { content: "✦"; }
            #l-profile::before { content: "⚙"; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at center, #111 0%, #000 100%);">
        <div class="card" style="width:100%; max-width:400px; text-align: center;">
            <div class="logo">CRONOS<span>7</span></div>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="input-node" placeholder="Researcher Alias">
            </div>
            <input type="email" id="auth-email" class="input-node" placeholder="Node Email">
            <input type="password" id="auth-pass" class="input-node" placeholder="Access Key">
            <button class="btn-primary" id="btn-auth" onclick="handleAuth()">Access Network</button>
            <p onclick="toggleAuth()" style="color:var(--text-dim); font-size:0.85rem; margin-top:25px; cursor:pointer">
                Switch protocol: <span style="color:var(--primary)" id="auth-toggle-text">Create Account</span>
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="sidebar">
            <div class="logo">CRONOS<span>7</span></div>
            <div class="nav-link active" id="l-feed" onclick="showTab('feed')"><span>Data Stream</span></div>
            <div class="nav-link" id="l-create" onclick="showTab('create')"><span>New Broadcast</span></div>
            <div class="nav-link" id="l-profile" onclick="showTab('profile')"><span>Base Station</span></div>
            <div class="logout-box" style="margin-top:auto;">
                <button class="btn-primary" style="background:#331111; color:#ff4444; font-size: 0.8rem; padding: 10px;" onclick="logout()">Terminate</button>
            </div>
        </nav>

        <main class="main-content container">
            <div id="tab-feed">
                <div style="margin-bottom: 30px;">
                    <input type="text" id="search-bar" class="input-node" placeholder="Filter transmissions..." oninput="loadPosts(this.value)">
                </div>
                <div id="feed-container">
                    <div style="text-align:center; color:var(--text-dim); padding:40px;">Initializing uplink...</div>
                </div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin-top:0; margin-bottom:20px; color: var(--primary);">New Transmission</h3>
                    <input type="text" id="post-t" class="input-node" placeholder="Transmission Subject">
                    <textarea id="post-c" class="input-node" rows="6" placeholder="Encryption payload content..."></textarea>
                    <button class="btn-primary" onclick="publishPost()" id="btn-publish">Execute Broadcast</button>
                </div>
            </div>

            <div id="tab-profile" class="hidden">
                <div id="profile-render" class="card"></div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('btn-auth').innerText = isReg ? "Initialize Node" : "Access Network";
            document.getElementById('auth-toggle-text').innerText = isReg ? "Sign In" : "Create Account";
        }

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                const link = document.getElementById('l-'+id);
                if(link) link.classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts();
            if(t === 'profile') renderProfile();
        }

        async function handleAuth() {
            const btn = document.getElementById('btn-auth');
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            
            if(!email || !pass) return alert("All fields required.");
            
            btn.disabled = true;
            btn.innerText = "Connecting...";
            
            try {
                if(isReg) {
                    const user = document.getElementById('reg-user').value.trim() || "Researcher";
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const profileData = {
                        username: user,
                        role: "Field Researcher", 
                        pic: `https://api.dicebear.com/7.x/bottts/svg?seed=${user}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection("users").doc(res.user.uid).set(profileData);
                    userProfile = profileData;
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (err) { 
                alert("Protocol Error: " + err.message); 
                btn.disabled = false;
                btn.innerText = "Retry Access";
            }
        }

        function loadPosts(filter = "") {
            const container = document.getElementById('feed-container');
            const query = db.collection("posts").orderBy("timestamp", "desc").limit(50);

            query.onSnapshot(snap => {
                if(snap.empty) {
                    container.innerHTML = `<div style="color:var(--text-dim); text-align:center;">Silence in the network...</div>`;
                    return;
                }

                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(filter && !p.title.toLowerCase().includes(filter.toLowerCase())) return;

                    const card = document.createElement('div');
                    card.className = "card post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${p.authorPic}" class="avatar">
                            <div>
                                <div style="font-weight:700; color:#fff">@${p.author}</div>
                                <div style="font-size:0.7rem; color:var(--primary); font-weight:600">${p.authorRole}</div>
                            </div>
                        </div>
                        <div style="font-weight:800; margin-bottom:10px; font-size:1.2rem; color:var(--primary)">${p.title}</div>
                        <div style="color:#bbb; font-size:0.95rem;">${p.body}</div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            if(!t || !c) return alert("Payload incomplete.");
            
            const btn = document.getElementById('btn-publish');
            btn.disabled = true;
            btn.innerText = "Broadcasting...";
            
            try {
                await db.collection("posts").add({
                    title: t, 
                    body: c,
                    author: userProfile.username,
                    authorPic: userProfile.pic, 
                    authorRole: userProfile.role,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('post-t').value = "";
                document.getElementById('post-c').value = "";
                showTab('feed');
            } catch (e) { 
                alert("Broadcast failure."); 
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute Broadcast";
            }
        }

        function renderProfile() {
            if(!userProfile) return;
            const container = document.getElementById('profile-render');
            container.innerHTML = `
                <div style="text-align:center; padding: 20px 0;">
                    <img src="${userProfile.pic}" style="width:100px; height:100px; margin-bottom:20px; border-radius:24px; border:3px solid var(--primary); padding:5px; background:#000;">
                    <h2 style="margin:0; font-size:1.8rem;">@${userProfile.username}</h2>
                    <p style="color:var(--primary); font-weight:600; margin-top:5px;">${userProfile.role}</p>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:30px; text-align:left;">
                        <div class="card" style="margin:0; padding:15px; background:#181818;">
                            <div style="font-size:0.7rem; color:var(--text-dim)">STATUS</div>
                            <div style="color:#00ff88; font-weight:800">OPERATIONAL</div>
                        </div>
                        <div class="card" style="margin:0; padding:15px; background:#181818;">
                            <div style="font-size:0.7rem; color:var(--text-dim)">UPLINK</div>
                            <div style="color:var(--primary); font-weight:800">ENCRYPTED</div>
                        </div>
                    </div>
                </div>
            `;
        }

        auth.onAuthStateChanged(async user => {
            const authScr = document.getElementById('auth-screen');
            const appScr = document.getElementById('app-screen');
            
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                userProfile = doc.data();
                authScr.classList.add('hidden');
                appScr.classList.remove('hidden');
                showTab('feed');
            } else {
                authScr.classList.remove('hidden');
                appScr.classList.add('hidden');
            }
        });

        function logout() { 
            if(confirm("Terminate connection?")) auth.signOut(); 
        }
    </script>
</body>
</html>
