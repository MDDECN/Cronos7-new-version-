<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Professional Research Network</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a2ff; --bg: #050505; --panel: #111111; --text: #f0f0f0; 
            --border: #222222; --accent: #7c3aed;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
        }

        .hidden { display: none !important; }

        .sidebar { 
            width: 260px; background: var(--panel); border-right: 1px solid var(--border); 
            position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 30px 20px;
            box-sizing: border-box; z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); letter-spacing: -1px; margin-bottom: 40px; }

        .nav-link { 
            padding: 12px 16px; margin: 4px 0; border-radius: 12px; cursor: pointer;
            transition: 0.2s; color: #888; font-weight: 600; display: flex; align-items: center; gap: 12px;
        }

        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3); }

        .main-content { margin-left: 260px; padding: 40px; max-width: 800px; }

        .search-container { margin-bottom: 30px; position: relative; }
        .search-input { 
            width: 100%; background: var(--panel); border: 1px solid var(--border); 
            padding: 14px 20px; border-radius: 14px; color: white; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0, 162, 255, 0.1); }

        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 18px; 
            padding: 24px; margin-bottom: 24px; transition: 0.3s;
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; background: #222; }
        .author-name { font-weight: 700; color: #fff; font-size: 0.95rem; cursor: pointer; }
        .author-role { font-size: 0.75rem; color: #666; font-weight: 600; text-transform: uppercase; }

        .post-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
        .post-body { line-height: 1.6; color: #ccc; margin-bottom: 15px; }
        .post-img { width: 100%; border-radius: 14px; border: 1px solid var(--border); }

        .btn-action { 
            background: #1a1a1a; border: 1px solid var(--border); color: #888; 
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-action:hover { border-color: var(--primary); color: #fff; }
        .liked { background: rgba(0, 162, 255, 0.1); border-color: var(--primary); color: var(--primary); }

        .profile-hero { text-align: center; padding: 20px 0; }
        .profile-large-avatar { width: 100px; height: 100px; border-radius: 24px; margin-bottom: 16px; border: 2px solid var(--primary); }

        .btn-primary { 
            background: var(--primary); color: white; border: none; padding: 12px 24px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .nav-link span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
            .logo { font-size: 1.2rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="card" style="width:350px;">
            <h2 id="auth-title" style="text-align:center; margin-bottom:30px;">CRONOS 7</h2>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" class="search-input" style="margin-bottom:10px" placeholder="@username">
            </div>
            <input type="email" id="auth-email" class="search-input" style="margin-bottom:10px" placeholder="Email">
            <input type="password" id="auth-pass" class="search-input" style="margin-bottom:20px" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth()">Continue</button>
            <p onclick="toggleAuth()" style="text-align:center; color:var(--primary); font-size:0.8rem; margin-top:20px; cursor:pointer">Switch Login/Register</p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <div class="logo">CRONOS</div>
            <div class="nav-link active" id="l-feed" onclick="showTab('feed')"><span>Feed</span></div>
            <div class="nav-link" id="l-create" onclick="showTab('create')"><span>Broadcast</span></div>
            <div class="nav-link" id="l-profile" onclick="showTab('profile')"><span>Station</span></div>
            <button class="btn-action" onclick="logout()" style="margin-top:auto">Sign Out</button>
        </div>

        <div class="main-content">
            <div id="tab-feed">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search @researcher..." onkeydown="if(event.key==='Enter') searchUser(this.value)">
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="card profile-hero">
                    <img id="p-img" src="" class="profile-large-avatar">
                    <h2 id="p-name" style="margin:0"></h2>
                    <p id="p-role" style="color:var(--primary); font-weight:700;"></p>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <input type="file" id="up-img" class="hidden" onchange="processImage(this, 'p-data-img')">
                        <label for="up-img" class="btn-action" style="flex:1">Change Photo</label>
                        <input type="hidden" id="p-data-img">
                    </div>
                    <input type="text" id="p-new-role" class="search-input" style="margin-top:10px" placeholder="Update Role">
                    <button class="btn-primary" style="margin-top:15px" onclick="updateProfile()">Save Station</button>
                </div>
                <div id="my-posts"></div>
            </div>

            <div id="tab-create" class="hidden">
                <div class="card">
                    <h3 style="margin-top:0">New Transmission</h3>
                    <input type="text" id="post-t" class="search-input" style="margin-bottom:10px" placeholder="Title">
                    <label for="post-up" class="btn-action" style="display:block; text-align:center; margin-bottom:10px">📎 Add Media</label>
                    <input type="file" id="post-up" class="hidden" onchange="processImage(this, 'post-data-img')">
                    <input type="hidden" id="post-data-img">
                    <textarea id="post-c" class="search-input" rows="5" placeholder="Theory or project details..."></textarea>
                    <button class="btn-primary" style="margin-top:10px" onclick="publishPost()">Send Broadcast</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('auth-title').innerText = isReg ? "SIGN UP" : "LOGIN";
        }

        async function handleAuth() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(isReg) {
                    const u = document.getElementById('reg-user').value.toLowerCase().trim();
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection("users").doc(res.user.uid).set({
                        username: u, role: "Independent Researcher", pic: "https://ui-avatars.com/api/?name="+u, followers: []
                    });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch (err) { alert(err.message); }
        }

        function processImage(input, target) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(target).value = e.target.result;
                    if(target === 'p-data-img') document.getElementById('p-img').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function searchUser(u) {
            const snap = await db.collection("users").where("username", "==", u.toLowerCase().trim()).get();
            if(!snap.empty) {
                const data = snap.docs[0].data();
                const uid = snap.docs[0].id;
                document.getElementById('p-name').innerText = "@" + data.username;
                document.getElementById('p-role').innerText = data.role;
                document.getElementById('p-img').src = data.pic;
                showTab('profile');
                loadPosts(uid, 'my-posts');
            } else { alert("User not found"); }
        }

        function loadPosts(uid, containerId) {
            let q = db.collection("posts");
            if(uid) q = q.where("authorId", "==", uid);
            q.orderBy("timestamp", "desc").onSnapshot(snap => {
                const div = document.getElementById(containerId);
                div.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const isLiked = p.likes.includes(auth.currentUser.uid);
                    div.innerHTML += `
                        <div class="card">
                            <div class="post-header">
                                <img src="${p.authorPic}" class="avatar">
                                <div>
                                    <div class="author-name" onclick="searchUser('${p.author}')">@${p.author}</div>
                                    <div class="author-role">${p.authorRole}</div>
                                </div>
                            </div>
                            <div class="post-title">${p.title}</div>
                            <div class="post-body">${p.body}</div>
                            ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
                            <div style="margin-top:15px; display:flex; gap:10px;">
                                <button class="btn-action ${isLiked?'liked':''}" onclick="like('${doc.id}', ${JSON.stringify(p.likes)})">▲ ${p.likes.length}</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function like(id, current) {
            const u = auth.currentUser.uid;
            const next = current.includes(u) ? current.filter(l => l !== u) : [...current, u];
            await db.collection("posts").doc(id).update({ likes: next });
        }

        async function publishPost() {
            const t = document.getElementById('post-t').value;
            const c = document.getElementById('post-c').value;
            const img = document.getElementById('post-data-img').value;
            if(!t || !c) return;
            await db.collection("posts").add({
                title: t, body: c, image: img || null,
                author: userProfile.username, authorId: auth.currentUser.uid,
                authorPic: userProfile.pic, authorRole: userProfile.role,
                likes: [], timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showTab('feed');
        }

        async function updateProfile() {
            const pic = document.getElementById('p-data-img').value;
            const role = document.getElementById('p-new-role').value;
            await db.collection("users").doc(auth.currentUser.uid).update({
                pic: pic || userProfile.pic, role: role || userProfile.role
            });
            location.reload();
        }

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('l-'+id).classList.toggle('active', id === t);
            });
            if(t === 'feed') loadPosts(null, 'feed-container');
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const d = await db.collection("users").doc(user.uid).get();
                userProfile = d.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('p-name').innerText = "@" + userProfile.username;
                document.getElementById('p-role').innerText = userProfile.role;
                document.getElementById('p-img').src = userProfile.pic;
                showTab('feed');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
