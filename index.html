<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Public Social Network</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #00a2ff; --bg: #050505; --panel: #111; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hidden { display: none !important; }
        
        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 380px; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        .main-app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; }
        .content { padding: 40px; overflow-y: auto; }

        .nav-link { padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-title { color: var(--primary); font-size: 1.2rem; display: block; }
        
        .delete-btn { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 12px; position: absolute; top: 20px; right: 20px; }

        .actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .action-btn { cursor: pointer; font-size: 14px; color: #888; background: none; border: none; }
        
        .comment-section { margin-top: 10px; padding-top: 10px; font-size: 13px; }
        .comment { background: #1a1a1a; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
        .comment b { color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h1>CRONOS <span style="color:var(--primary)">7</span></h1>
            <input type="text" id="reg-name" placeholder="Unique Username">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">SIGN IN / REGISTER</button>
        </div>
    </div>

    <div id="app-screen" class="main-app hidden">
        <div class="sidebar">
            <h2 style="color: var(--primary);">CRONOS 7</h2>
            <div id="user-display" style="font-size:13px; color:#888; margin-bottom: 20px;"></div>
            <div class="nav-link active" onclick="showTab('feed')">Global Feed</div>
            <div class="nav-link" onclick="showTab('create')">New Post</div>
            <button style="margin-top: 50px; background: #ff4444;" class="btn-main" onclick="logout()">LOG OUT</button>
        </div>

        <div class="content">
            <div id="tab-feed">
                <h1>Community Feed</h1>
                <div id="posts-container">Loading posts...</div>
            </div>

            <div id="tab-create" class="hidden">
                <h1>Create Story</h1>
                <input type="text" id="post-title" placeholder="Title">
                <textarea id="post-content" rows="6" placeholder="Content..."></textarea>
                <button class="btn-main" onclick="publishPost()">PUBLISH</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('reg-name').value.trim();

            try {
                await auth.signInWithEmailAndPassword(email, pass).catch(async (err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                        if(!name) throw new Error("Please enter a username for your new account.");
                        const snap = await db.collection("users").where("username", "==", name).get();
                        if(!snap.empty) throw new Error("Username already taken!");

                        const newUser = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(newUser.user.uid).set({ username: name });
                        return newUser;
                    }
                    throw err;
                });
            } catch (e) { alert(e.message); }
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const body = document.getElementById('post-content').value;
            if(!title || !body) return alert("Fields cannot be empty");

            const postId = Date.now().toString();
            await db.collection("posts").doc(postId).set({
                title, body,
                author: userProfile.username,
                authorId: auth.currentUser.uid,
                likes: 0,
                comments: [],
                link: `https://cronot.me/${userProfile.username}/${postId}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('post-title').value = "";
            document.getElementById('post-content').value = "";
            showTab('feed');
        }

        function loadFeed() {
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const post = doc.data();
                    const id = doc.id;
                    const isOwner = post.authorId === auth.currentUser.uid;
                    
                    container.innerHTML += `
                        <div class="card">
                            ${isOwner ? `<button class="delete-btn" onclick="deletePost('${id}')">Delete</button>` : ''}
                            <div class="post-header">
                                <b class="post-title">${post.title}</b>
                                <small>@${post.author}</small>
                            </div>
                            <p>${post.body}</p>
                            <div class="actions">
                                <button class="action-btn" onclick="likePost('${id}', ${post.likes})">❤️ ${post.likes}</button>
                                <button class="action-btn" onclick="addComment('${id}')">💬 Comment</button>
                            </div>
                            <div class="comment-section">
                                ${post.comments.map(c => `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                            </div>
                        </div>
                    `;
                });
            });
        }

        async function likePost(id, current) {
            await db.collection("posts").doc(id).update({ likes: current + 1 });
        }

        async function deletePost(id) {
            if(confirm("Delete this post?")) await db.collection("posts").doc(id).delete();
        }

        async function addComment(id) {
            const msg = prompt("Comment:");
            if(!msg) return;
            await db.collection("posts").doc(id).update({
                comments: firebase.firestore.FieldValue.arrayUnion({
                    user: userProfile.username,
                    text: msg
                })
            });
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                userProfile = doc.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerText = "@" + userProfile.username;
                loadFeed();
            }
        });

        function showTab(t) {
            document.getElementById('tab-feed').classList.toggle('hidden', t !== 'feed');
            document.getElementById('tab-create').classList.toggle('hidden', t !== 'create');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(t === 'feed') document.querySelectorAll('.nav-link')[0].classList.add('active');
            if(t === 'create') document.querySelectorAll('.nav-link')[1].classList.add('active');
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
